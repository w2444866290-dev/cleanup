<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>cleanup-disk · Whisper · refined</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #f3f1ec; font-family: Inter, -apple-system, system-ui, sans-serif; }
  body { color: #1f1f1f; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="terminal.jsx"></script>
<script type="text/babel" src="option-a-whisper.jsx"></script>
<script type="text/babel" src="option-a-tokens.jsx"></script>
<script type="text/babel" src="option-a-v4.jsx"></script>

<script type="text/babel" data-presets="env,react">
const App = () => (
  <DesignCanvas>
    <DCSection id="tokens" title="设计语言" subtitle="色板、字符、栅格——所有界面共享的基础规则">
      <DCArtboard id="palette"  label="① 色板"        width={720} height={540}><A_Palette /></DCArtboard>
      <DCArtboard id="glyphs"   label="② 字符"        width={720} height={540}><A_Glyphs /></DCArtboard>
      <DCArtboard id="anatomy"  label="③ 主菜单解剖"  width={720} height={600}><A_Anatomy /></DCArtboard>
    </DCSection>

    <DCSection id="screens" title="完整状态图 · v3 (zh-CN)" subtitle="10 屏覆盖所有可见路径，含列表上下省略指示">
      <DCArtboard id="scan-intro"   label="① 扫描启动"           width={720} height={540}><A_ScanIntro /></DCArtboard>
      <DCArtboard id="scan"         label="② 扫描中"             width={720} height={540}><A_Scan /></DCArtboard>
      <DCArtboard id="menu"         label="③ 主菜单（≤7 项）"   width={740} height={600}><A_Menu /></DCArtboard>
      <DCArtboard id="menu-of"      label="④ 主菜单（>7 项·省略示意）" width={740} height={600}><A_MenuOverflow /></DCArtboard>
      <DCArtboard id="buttons"      label="⑤ 按钮四态"           width={720} height={540}><A_Buttons /></DCArtboard>
      <DCArtboard id="empty"        label="⑥ 空状态"             width={720} height={300}><A_Empty /></DCArtboard>
      <DCArtboard id="confirm"      label="⑦ 二次确认"           width={720} height={620}><A_Confirm /></DCArtboard>
      <DCArtboard id="execute"      label="⑧ 清理中"             width={720} height={420}><A_Execute /></DCArtboard>
      <DCArtboard id="done"         label="⑨ 完成"               width={720} height={460}><A_Done /></DCArtboard>
      <DCArtboard id="cancel"       label="⑩ 已取消"             width={720} height={200}><A_Cancel /></DCArtboard>
    </DCSection>

    <DCSection id="screens-v4" title="完整状态图 · v4 (中文母语版)" subtitle="砍 kicker 、句子化 disk strip、括号按钮、release banner 丢横线——与上方 v3 对比">
      <DCArtboard id="v4-scan-intro" label="① 扫描启动"           width={720} height={540}><V4_ScanIntro /></DCArtboard>
      <DCArtboard id="v4-scan"       label="② 扫描中"             width={720} height={540}><V4_Scan /></DCArtboard>
      <DCArtboard id="v4-menu"       label="③ 主菜单（≤7 项）"   width={740} height={600}><V4_Menu /></DCArtboard>
      <DCArtboard id="v4-menu-of"    label="④ 主菜单（>7 项·省略示意）" width={740} height={620}><V4_MenuOverflow /></DCArtboard>
      <DCArtboard id="v4-buttons"    label="⑤ 按钮四态"           width={720} height={540}><V4_Buttons /></DCArtboard>
      <DCArtboard id="v4-empty"      label="⑥ 空状态"             width={720} height={280}><V4_Empty /></DCArtboard>
      <DCArtboard id="v4-confirm"    label="⑦ 二次确认"           width={720} height={620}><V4_Confirm /></DCArtboard>
      <DCArtboard id="v4-execute"    label="⑧ 清理中"             width={720} height={380}><V4_Execute /></DCArtboard>
      <DCArtboard id="v4-done"       label="⑨ 完成"               width={720} height={460}><V4_Done /></DCArtboard>
      <DCArtboard id="v4-cancel"     label="⑩ 已取消"             width={720} height={200}><V4_Cancel /></DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</html>
